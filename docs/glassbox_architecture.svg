<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" font-family="Arial, sans-serif">
  <rect width="1000" height="600" fill="white"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2e5299"/>
    </marker>
    <marker id="arrTeal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0D9488"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cc3333"/>
    </marker>
    <marker id="arrGrey" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888888"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e6a800"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a2744">GlassBox — System Architecture</text>
  <text x="500" y="46" text-anchor="middle" font-size="11" fill="#555555">Every response verified · every verdict stored · every behavioral property tracked over time</text>

  <!-- Zone labels (side bands) -->
  <rect x="16" y="62" width="13" height="490" rx="4" fill="#d5e8f0"/>
  <text x="22" y="312" text-anchor="middle" font-size="10" fill="#2e5299" font-weight="bold" transform="rotate(-90,22,312)">LIVE REQUEST PATH</text>

  <rect x="971" y="62" width="13" height="490" rx="4" fill="#ccf5f0"/>
  <text x="977" y="312" text-anchor="middle" font-size="10" fill="#0D9488" font-weight="bold" transform="rotate(90,977,312)">OPERATOR VISIBILITY</text>

  <!-- Vertical divider -->
  <line x1="494" y1="62" x2="494" y2="552" stroke="#dddddd" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- ══════ LEFT: LIVE REQUEST PATH ══════ -->

  <!-- 1. Customer -->
  <rect x="130" y="70" width="220" height="52" rx="6" fill="#e6faf8" stroke="#0D9488" stroke-width="1.5"/>
  <text x="240" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Customer</text>
  <text x="240" y="108" text-anchor="middle" font-size="10" fill="#555555">Greets · states issue · provides name &amp; order number</text>

  <!-- arrow down -->
  <line x1="240" y1="122" x2="240" y2="138" stroke="#2e5299" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. Agent Service (large box) -->
  <rect x="45" y="138" width="430" height="158" rx="6" fill="#f5f0ff" stroke="#7755cc" stroke-width="1.5"/>
  <text x="260" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Agent Service  —  Claude Sonnet</text>
  <text x="260" y="174" text-anchor="middle" font-size="10" fill="#555555">Multi-turn reasoning loop · up to 5 tool calls per turn</text>

  <!-- Loop arrow inside agent box -->
  <path d="M 68 240 Q 54 240 54 260 Q 54 280 68 280" fill="none" stroke="#7755cc" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="43" y="265" text-anchor="middle" font-size="8" fill="#7755cc" transform="rotate(-90,43,265)">loop</text>

  <!-- Tool badge label -->
  <text x="260" y="194" text-anchor="middle" font-size="9" fill="#888888">Non-LLM tools  ·  deterministic  ·  direct DB reads</text>

  <!-- Tool badges row 1 -->
  <rect x="80" y="200" width="120" height="22" rx="4" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="140" y="215" text-anchor="middle" font-size="9" fill="#b07800">lookup_customer</text>

  <rect x="210" y="200" width="100" height="22" rx="4" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="260" y="215" text-anchor="middle" font-size="9" fill="#b07800">get_order</text>

  <rect x="320" y="200" width="130" height="22" rx="4" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="385" y="215" text-anchor="middle" font-size="9" fill="#b07800">check_eligibility</text>

  <!-- Tool badges row 2 -->
  <rect x="80" y="230" width="120" height="22" rx="4" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="140" y="245" text-anchor="middle" font-size="9" fill="#b07800">get_return_label</text>

  <rect x="210" y="230" width="100" height="22" rx="4" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="260" y="245" text-anchor="middle" font-size="9" fill="#b07800">get_billing</text>

  <rect x="320" y="230" width="130" height="22" rx="4" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="385" y="245" text-anchor="middle" font-size="9" fill="#b07800">get_order_history</text>

  <!-- arrow down from agent -->
  <line x1="260" y1="296" x2="260" y2="312" stroke="#2e5299" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Judge Service -->
  <rect x="45" y="312" width="430" height="52" rx="6" fill="#fde8e8" stroke="#cc3333" stroke-width="1.5"/>
  <text x="260" y="334" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Judge Service  —  Claude Haiku</text>
  <text x="260" y="350" text-anchor="middle" font-size="10" fill="#555555">Scores response + tool trace · 3 non-negotiables + 4 behavioral properties</text>

  <!-- arrow down from judge -->
  <line x1="170" y1="364" x2="170" y2="378" stroke="#2e5299" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="364" x2="350" y2="378" stroke="#888888" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrGrey)"/>

  <!-- 4a. Sync Storage -->
  <rect x="45" y="378" width="200" height="52" rx="6" fill="#f0f0f0" stroke="#888888" stroke-width="1.5"/>
  <text x="145" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2744">Storage  (sync)</text>
  <text x="145" y="416" text-anchor="middle" font-size="9" fill="#555555">runs · sessions · conformance_results</text>

  <!-- 4b. Async Log -->
  <rect x="256" y="378" width="219" height="52" rx="6" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="365" y="398" text-anchor="middle" font-size="11" font-weight="bold" fill="#444444">Async Log Hydration</text>
  <text x="365" y="413" text-anchor="middle" font-size="9" fill="#888888">chat_logs (SQLite) · chat_logs.jsonl</text>
  <text x="365" y="426" text-anchor="middle" font-size="8" fill="#aaaaaa" font-style="italic">non-blocking · fires after every turn</text>

  <!-- ══════ RIGHT: OPERATOR VISIBILITY ══════ -->

  <!-- 1. Behavioral Spec -->
  <rect x="514" y="70" width="440" height="52" rx="6" fill="#e6faf8" stroke="#0D9488" stroke-width="1.5"/>
  <text x="734" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Behavioral Spec</text>
  <text x="734" y="108" text-anchor="middle" font-size="10" fill="#555555">Non-negotiables (zero tolerance) + behavioral properties (scored 0–1)</text>

  <!-- arrow down -->
  <line x1="734" y1="122" x2="734" y2="138" stroke="#0D9488" stroke-width="1.2" marker-end="url(#arrTeal)"/>

  <!-- 2. Test Suite -->
  <rect x="514" y="138" width="440" height="52" rx="6" fill="#d5e8f0" stroke="#2e5299" stroke-width="1.5"/>
  <text x="734" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Behavioral Test Suite</text>
  <text x="734" y="176" text-anchor="middle" font-size="10" fill="#555555">36 labeled examples · per-property conformance · run before every deploy</text>

  <!-- arrow down -->
  <line x1="734" y1="190" x2="734" y2="206" stroke="#2e5299" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- 3. Drift + Compare (side by side) -->
  <rect x="514" y="206" width="212" height="52" rx="6" fill="#f5f0ff" stroke="#7755cc" stroke-width="1.5"/>
  <text x="620" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2744">Drift Detection</text>
  <text x="620" y="244" text-anchor="middle" font-size="9" fill="#555555">Baseline vs. today · delta per property</text>

  <rect x="738" y="206" width="216" height="52" rx="6" fill="#fff8e1" stroke="#e6a800" stroke-width="1.5"/>
  <text x="846" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2744">Model Comparison</text>
  <text x="846" y="244" text-anchor="middle" font-size="9" fill="#555555">Sonnet vs. Haiku on behavioral criteria</text>

  <!-- arrows down -->
  <line x1="620" y1="258" x2="620" y2="274" stroke="#7755cc" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="846" y1="258" x2="846" y2="274" stroke="#e6a800" stroke-width="1.2" marker-end="url(#arrAmber)"/>

  <!-- 4. Production Monitor -->
  <rect x="514" y="274" width="440" height="52" rx="6" fill="#fde8e8" stroke="#cc3333" stroke-width="1.5"/>
  <text x="734" y="296" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Production Monitor</text>
  <text x="734" y="312" text-anchor="middle" font-size="10" fill="#555555">Live conformance rate · category breakdown · alert log</text>

  <!-- arrow down -->
  <line x1="734" y1="326" x2="734" y2="342" stroke="#cc3333" stroke-width="1.2" marker-end="url(#arrRed)"/>

  <!-- 5. Chat Log Analytics -->
  <rect x="514" y="342" width="440" height="62" rx="6" fill="#f0f0f0" stroke="#888888" stroke-width="1.5"/>
  <text x="734" y="364" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Chat Log Analytics</text>
  <text x="734" y="380" text-anchor="middle" font-size="10" fill="#555555">Tool call sequences · turns to resolution · recurring issues</text>
  <text x="734" y="396" text-anchor="middle" font-size="9" fill="#888888" font-style="italic">SQLite for in-app queries · JSONL for external export (Pandas, etc.)</text>

  <!-- ══════ CROSS-ZONE CONNECTIONS ══════ -->

  <!-- Spec → Agent runtime enforcement (dashed, across divider) -->
  <line x1="514" y1="96" x2="475" y2="158" stroke="#0D9488" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrTeal)"/>
  <text x="497" y="118" text-anchor="middle" font-size="8" fill="#0D9488" font-style="italic">enforced at runtime</text>

  <!-- Storage → Chat Log Analytics (dashed, across divider) -->
  <line x1="245" y1="404" x2="514" y2="380" stroke="#888888" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrGrey)"/>
  <text x="380" y="386" text-anchor="middle" font-size="8" fill="#888888" font-style="italic">data feeds operator views</text>

  <!-- Legend -->
  <line x1="40" y1="480" x2="960" y2="480" stroke="#eeeeee" stroke-width="1"/>

  <rect x="40" y="492" width="12" height="10" fill="#e6faf8" stroke="#0D9488" stroke-width="1"/>
  <text x="58" y="502" font-size="9" fill="#555555">Customer / Spec</text>

  <rect x="160" y="492" width="12" height="10" fill="#f5f0ff" stroke="#7755cc" stroke-width="1"/>
  <text x="178" y="502" font-size="9" fill="#555555">Agent / Drift</text>

  <rect x="260" y="492" width="12" height="10" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="278" y="502" font-size="9" fill="#555555">Tools / Compare</text>

  <rect x="370" y="492" width="12" height="10" fill="#fde8e8" stroke="#cc3333" stroke-width="1"/>
  <text x="388" y="502" font-size="9" fill="#555555">Judge / Monitor</text>

  <rect x="470" y="492" width="12" height="10" fill="#d5e8f0" stroke="#2e5299" stroke-width="1"/>
  <text x="488" y="502" font-size="9" fill="#555555">Test Suite</text>

  <rect x="560" y="492" width="12" height="10" fill="#f0f0f0" stroke="#888888" stroke-width="1"/>
  <text x="578" y="502" font-size="9" fill="#555555">Storage / Analytics</text>

  <rect x="680" y="492" width="12" height="10" fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="698" y="502" font-size="9" fill="#555555">Async (non-blocking)</text>
</svg>
