<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" font-family="Arial, sans-serif">
  <rect width="1000" height="580" fill="white"/>

  <!-- Title -->
  <text x="500" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a2744">GlassBox — Who Uses It</text>
  <text x="500" y="46" text-anchor="middle" font-size="11" fill="#555555">Two audiences · one system · full visibility for both</text>

  <!-- ══════ CUSTOMER PERSONAS ══════ -->
  <text x="500" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#0D9488" letter-spacing="2">CUSTOMER PERSONAS</text>
  <line x1="40" y1="78" x2="960" y2="78" stroke="#ccf5f0" stroke-width="1"/>

  <!-- ── Card: Sarah Chen ── -->
  <rect x="35" y="88" width="290" height="178" rx="6" fill="white" stroke="#dddddd" stroke-width="1.2"/>
  <rect x="35" y="88" width="290" height="6" rx="3" fill="#0D9488"/>
  <text x="180" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Sarah Chen</text>
  <text x="180" y="130" text-anchor="middle" font-size="10" fill="#0D9488">Delayed Order</text>
  <line x1="55" y1="138" x2="305" y2="138" stroke="#f0f0f0" stroke-width="1"/>
  <text x="55" y="154" font-size="10" fill="#555555" font-style="italic">"My order shipped 12 days ago</text>
  <text x="55" y="168" font-size="10" fill="#555555" font-style="italic"> and hasn't moved since."</text>
  <text x="55" y="188" font-size="9" font-weight="bold" fill="#888888">Tools invoked:</text>
  <rect x="55" y="196" width="108" height="18" rx="3" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="109" y="209" text-anchor="middle" font-size="8" fill="#b07800">lookup_customer</text>
  <rect x="170" y="196" width="78" height="18" rx="3" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="209" y="209" text-anchor="middle" font-size="8" fill="#b07800">get_order</text>
  <text x="55" y="234" font-size="9" font-weight="bold" fill="#888888">Non-negotiable at risk:</text>
  <rect x="55" y="242" width="125" height="18" rx="3" fill="#fde8e8" stroke="#cc3333" stroke-width="1"/>
  <text x="117" y="255" text-anchor="middle" font-size="8" fill="#cc3333">escalation_threshold</text>

  <!-- ── Card: James Rodriguez ── -->
  <rect x="355" y="88" width="290" height="178" rx="6" fill="white" stroke="#dddddd" stroke-width="1.2"/>
  <rect x="355" y="88" width="290" height="6" rx="3" fill="#2e5299"/>
  <text x="500" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">James Rodriguez</text>
  <text x="500" y="130" text-anchor="middle" font-size="10" fill="#2e5299">Return Request (in window)</text>
  <line x1="375" y1="138" x2="625" y2="138" stroke="#f0f0f0" stroke-width="1"/>
  <text x="375" y="154" font-size="10" fill="#555555" font-style="italic">"I received it 18 days ago,</text>
  <text x="375" y="168" font-size="10" fill="#555555" font-style="italic"> I just don't need it."</text>
  <text x="375" y="188" font-size="9" font-weight="bold" fill="#888888">Tools invoked:</text>
  <rect x="375" y="196" width="108" height="18" rx="3" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="429" y="209" text-anchor="middle" font-size="8" fill="#b07800">check_eligibility</text>
  <rect x="490" y="196" width="105" height="18" rx="3" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="542" y="209" text-anchor="middle" font-size="8" fill="#b07800">get_return_label</text>
  <text x="375" y="234" font-size="9" font-weight="bold" fill="#888888">Non-negotiable tested:</text>
  <rect x="375" y="242" width="120" height="18" rx="3" fill="#fde8e8" stroke="#cc3333" stroke-width="1"/>
  <text x="435" y="255" text-anchor="middle" font-size="8" fill="#cc3333">no_premature_refund</text>

  <!-- ── Card: Priya Patel ── -->
  <rect x="675" y="88" width="290" height="178" rx="6" fill="white" stroke="#dddddd" stroke-width="1.2"/>
  <rect x="675" y="88" width="290" height="6" rx="3" fill="#e6a800"/>
  <text x="820" y="114" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2744">Priya Patel</text>
  <text x="820" y="130" text-anchor="middle" font-size="10" fill="#e6a800">Billing Dispute</text>
  <line x1="695" y1="138" x2="945" y2="138" stroke="#f0f0f0" stroke-width="1"/>
  <text x="695" y="154" font-size="10" fill="#555555" font-style="italic">"There's an $89 charge I</text>
  <text x="695" y="168" font-size="10" fill="#555555" font-style="italic"> don't recognise."</text>
  <text x="695" y="188" font-size="9" font-weight="bold" fill="#888888">Tools invoked:</text>
  <rect x="695" y="196" width="95" height="18" rx="3" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="742" y="209" text-anchor="middle" font-size="8" fill="#b07800">get_billing</text>
  <rect x="797" y="196" width="90" height="18" rx="3" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="842" y="209" text-anchor="middle" font-size="8" fill="#b07800">get_order</text>
  <text x="695" y="234" font-size="9" font-weight="bold" fill="#888888">Non-negotiable tested:</text>
  <rect x="695" y="242" width="178" height="18" rx="3" fill="#fde8e8" stroke="#cc3333" stroke-width="1"/>
  <text x="784" y="255" text-anchor="middle" font-size="8" fill="#cc3333">no_unauthorized_account_details</text>

  <!-- ══════ INTERNAL PERSONAS ══════ -->
  <text x="500" y="298" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a2744" letter-spacing="2">INTERNAL PERSONAS  —  THE OPERATOR</text>
  <line x1="40" y1="304" x2="960" y2="304" stroke="#dddddd" stroke-width="1"/>

  <!-- ── Card: Alex Rivera (AI PM) ── -->
  <rect x="18" y="314" width="228" height="218" rx="6" fill="white" stroke="#dddddd" stroke-width="1.2"/>
  <rect x="18" y="314" width="228" height="6" rx="3" fill="#0D9488"/>
  <text x="132" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Alex Rivera</text>
  <text x="132" y="356" text-anchor="middle" font-size="10" fill="#0D9488">AI Product Manager</text>
  <line x1="38" y1="364" x2="226" y2="364" stroke="#f0f0f0" stroke-width="1"/>
  <text x="38" y="380" font-size="9" fill="#555555">Owns the behavioral spec.</text>
  <text x="38" y="394" font-size="9" fill="#555555">Makes go/no-go on model updates.</text>
  <text x="38" y="410" font-size="9" fill="#555555" font-style="italic">"Did this update change how</text>
  <text x="38" y="424" font-size="9" fill="#555555" font-style="italic"> the product behaves?"</text>
  <text x="38" y="444" font-size="9" font-weight="bold" fill="#888888">Uses:</text>
  <rect x="38" y="452" width="88" height="16" rx="3" fill="#e6faf8" stroke="#0D9488" stroke-width="1"/>
  <text x="82" y="464" text-anchor="middle" font-size="8" fill="#0D9488">Behavioral Spec</text>
  <rect x="133" y="452" width="78" height="16" rx="3" fill="#d5e8f0" stroke="#2e5299" stroke-width="1"/>
  <text x="172" y="464" text-anchor="middle" font-size="8" fill="#2e5299">Test Suite</text>
  <rect x="38" y="474" width="78" height="16" rx="3" fill="#fff8e1" stroke="#e6a800" stroke-width="1"/>
  <text x="77" y="486" text-anchor="middle" font-size="8" fill="#b07800">Compare</text>

  <!-- ── Card: Jordan Kim (ML Engineer) ── -->
  <rect x="260" y="314" width="228" height="218" rx="6" fill="white" stroke="#dddddd" stroke-width="1.2"/>
  <rect x="260" y="314" width="228" height="6" rx="3" fill="#7755cc"/>
  <text x="374" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Jordan Kim</text>
  <text x="374" y="356" text-anchor="middle" font-size="10" fill="#7755cc">ML Engineer</text>
  <line x1="280" y1="364" x2="468" y2="364" stroke="#f0f0f0" stroke-width="1"/>
  <text x="280" y="380" font-size="9" fill="#555555">Runs test suites. Manages</text>
  <text x="280" y="394" font-size="9" fill="#555555">prompt versions. Watches drift.</text>
  <text x="280" y="410" font-size="9" fill="#555555" font-style="italic">"Conformance dropped 11 pts.</text>
  <text x="280" y="424" font-size="9" fill="#555555" font-style="italic"> Which property? Why?"</text>
  <text x="280" y="444" font-size="9" font-weight="bold" fill="#888888">Uses:</text>
  <rect x="280" y="452" width="54" height="16" rx="3" fill="#f5f0ff" stroke="#7755cc" stroke-width="1"/>
  <text x="307" y="464" text-anchor="middle" font-size="8" fill="#7755cc">Drift</text>
  <rect x="342" y="452" width="78" height="16" rx="3" fill="#d5e8f0" stroke="#2e5299" stroke-width="1"/>
  <text x="381" y="464" text-anchor="middle" font-size="8" fill="#2e5299">Test Suite</text>
  <rect x="280" y="474" width="60" height="16" rx="3" fill="#f9f9f9" stroke="#888888" stroke-width="1"/>
  <text x="310" y="486" text-anchor="middle" font-size="8" fill="#555555">Internals</text>

  <!-- ── Card: Sam Torres (Compliance) ── -->
  <rect x="502" y="314" width="228" height="218" rx="6" fill="white" stroke="#dddddd" stroke-width="1.2"/>
  <rect x="502" y="314" width="228" height="6" rx="3" fill="#cc3333"/>
  <text x="616" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Sam Torres</text>
  <text x="616" y="356" text-anchor="middle" font-size="10" fill="#cc3333">Compliance Officer</text>
  <line x1="522" y1="364" x2="710" y2="364" stroke="#f0f0f0" stroke-width="1"/>
  <text x="522" y="380" font-size="9" fill="#555555">Audits non-negotiable failures.</text>
  <text x="522" y="394" font-size="9" fill="#555555">Needs a paper trail.</text>
  <text x="522" y="410" font-size="9" fill="#555555" font-style="italic">"Show every session where the</text>
  <text x="522" y="424" font-size="9" fill="#555555" font-style="italic"> escalation rule was violated."</text>
  <text x="522" y="444" font-size="9" font-weight="bold" fill="#888888">Uses:</text>
  <rect x="522" y="452" width="96" height="16" rx="3" fill="#fde8e8" stroke="#cc3333" stroke-width="1"/>
  <text x="570" y="464" text-anchor="middle" font-size="8" fill="#cc3333">Prod. Monitor</text>
  <rect x="624" y="452" width="76" height="16" rx="3" fill="#f0f0f0" stroke="#888888" stroke-width="1"/>
  <text x="662" y="464" text-anchor="middle" font-size="8" fill="#555555">Chat Logs</text>
  <rect x="522" y="474" width="88" height="16" rx="3" fill="#e6faf8" stroke="#0D9488" stroke-width="1"/>
  <text x="566" y="486" text-anchor="middle" font-size="8" fill="#0D9488">Behavioral Spec</text>

  <!-- ── Card: Morgan Lee (Support Manager) ── -->
  <rect x="744" y="314" width="238" height="218" rx="6" fill="white" stroke="#dddddd" stroke-width="1.2"/>
  <rect x="744" y="314" width="238" height="6" rx="3" fill="#e6a800"/>
  <text x="863" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a2744">Morgan Lee</text>
  <text x="863" y="356" text-anchor="middle" font-size="10" fill="#e6a800">Support Manager</text>
  <line x1="764" y1="364" x2="962" y2="364" stroke="#f0f0f0" stroke-width="1"/>
  <text x="764" y="380" font-size="9" fill="#555555">Bridges AI scores and customer</text>
  <text x="764" y="394" font-size="9" fill="#555555">outcomes. Owns resolution rates.</text>
  <text x="764" y="410" font-size="9" fill="#555555" font-style="italic">"Billing disputes are dropping.</text>
  <text x="764" y="424" font-size="9" fill="#555555" font-style="italic"> Model problem or policy gap?"</text>
  <text x="764" y="444" font-size="9" font-weight="bold" fill="#888888">Uses:</text>
  <rect x="764" y="452" width="96" height="16" rx="3" fill="#fde8e8" stroke="#cc3333" stroke-width="1"/>
  <text x="812" y="464" text-anchor="middle" font-size="8" fill="#cc3333">Prod. Monitor</text>
  <rect x="866" y="452" width="76" height="16" rx="3" fill="#f0f0f0" stroke="#888888" stroke-width="1"/>
  <text x="904" y="464" text-anchor="middle" font-size="8" fill="#555555">Sessions</text>
  <rect x="764" y="474" width="54" height="16" rx="3" fill="#f5f0ff" stroke="#7755cc" stroke-width="1"/>
  <text x="791" y="486" text-anchor="middle" font-size="8" fill="#7755cc">Drift</text>
</svg>
